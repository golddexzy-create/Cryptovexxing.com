<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cryptovexxing.com • MAX TERMINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        :root { --green: #00ff9d; --red: #ff3b5c; --blue: #00d0ff; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#050505; color:var(--green); font-family:'VT323',monospace; height:100vh; overflow:hidden; }
        .header { background:#0a0a0a; padding:12px 16px; border-bottom:4px solid var(--blue); display:flex; justify-content:space-between; align-items:center; font-size:1.55rem; }
        .logo { color:var(--blue); text-shadow:0 0 12px var(--blue); }
        .tabs { display:flex; background:#111; }
        .tab { padding:12px 20px; cursor:pointer; border-bottom:4px solid transparent; }
        .tab.active { border-bottom-color:var(--green); background:#1a1a1a; }
        .content { height:calc(100vh - 140px); overflow-y:auto; padding:8px; }
        .panel { background:rgba(15,15,15,0.95); border:2px solid #333; padding:14px; margin-bottom:12px; }
        .ticker { display:grid; grid-template-columns:repeat(auto-fit,minmax(135px,1fr)); gap:10px; }
        .coin { background:#1a1a1a; padding:12px; text-align:center; border:1px solid #444; }
        .price { font-size:1.75rem; font-weight:bold; }
        .ai-chat { height:340px; background:#000; padding:12px; overflow-y:auto; border:2px solid var(--blue); margin-bottom:8px; }
        .input-bar { position:fixed; bottom:0; left:0; right:0; background:#111; padding:12px; border-top:4px solid var(--green); display:flex; gap:8px; z-index:999; }
        input { flex:1; background:#000; border:2px solid var(--green); color:var(--green); padding:14px; font-size:1.25rem; }
        button { background:#000; color:var(--green); border:3px solid var(--green); padding:0 22px; font-size:1.3rem; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🤖 CRYPTOVEXXING.COM</div>
        <div>ONCHAIN AI TERMINAL</div>
    </div>
    
    <div class="tabs">
        <div class="tab active" onclick="switchTab(0)">TERMINAL</div>
        <div class="tab" onclick="switchTab(1)">AI ADVISOR</div>
        <div class="tab" onclick="switchTab(2)">CHARTS</div>
        <div class="tab" onclick="switchTab(3)">WALLET</div>
    </div>
    
    <div id="tab0" class="content">
        <div class="panel"><h2>LIVE FEED</h2><div class="ticker" id="tickers"></div></div>
        <div class="panel"><h2>POSITIONS</h2><table id="positions" style="width:100%"></table></div>
    </div>
    
    <div id="tab1" class="content" style="display:none">
        <div class="panel">
            <h2>CRYPTO / STOCKS AI ADVISOR</h2>
            <div id="ai-log" class="ai-chat"></div>
            <input id="ai-input" placeholder="Ask about BTC, SOL, stocks..." style="width:100%;">
        </div>
    </div>
    
    <div id="tab2" class="content" style="display:none">
        <div class="panel"><h2>ADVANCED CHARTS</h2><div style="height:420px;background:#111;display:flex;align-items:center;justify-content:center;border:2px dashed #00ff9d;color:#555;font-size:1.8rem;">[TRADINGVIEW WIDGET HERE]</div></div>
    </div>
    
    <div id="tab3" class="content" style="display:none">
        <div class="panel">
            <h2>ONCHAIN WALLET</h2>
            <button onclick="connectWallet()" style="width:100%;padding:18px;font-size:1.4rem;">CONNECT WALLET</button>
            <div id="wallet-info" style="margin-top:16px;"></div>
        </div>
    </div>
    
    <div class="input-bar">
        <input type="text" id="cmd" placeholder="buy SOL 50 | ai analyze BTC">
        <button onclick="executeCommand()">EXEC</button>
    </div>
    
    <script>
        let walletConnected = false;
        const coins = ["SOL","BTC","ETH","XRP","DOGE"];
        
        function updateTickers() {
            let html = "";
            coins.forEach(c => {
                html += `<div class="coin"><div>${c}USDT</div><div class="price" id="p-${c}">$--</div><div id="ch-${c}" style="color:var(--green)">+0.00%</div></div>`;
            });
            document.getElementById("tickers").innerHTML = html;
            setInterval(() => {
                coins.forEach(c => {
                    const base = c==="BTC" ? 68250 : c==="SOL" ? 148 : 3400;
                    const val = (base + Math.random()*800 - 400).toFixed(c==="BTC" ? 0 : 2);
                    document.getElementById(`p-${c}`).textContent = "$" + val;
                    const ch = (Math.random()*7 - 3).toFixed(2);
                    const chEl = document.getElementById(`ch-${c}`);
                    chEl.textContent = (ch>0?"+":"") + ch + "%";
                    chEl.style.color = ch>0 ? "var(--green)" : "var(--red)";
                });
            }, 1300);
        }
        
        function updatePositions() {
            let html = `<tr><th>Asset</th><th>Qty</th><th>PnL</th></tr>`;
            [{s:"SOL",q:"124.8",p:1840},{s:"BTC",q:"0.092",p:-320}].forEach(p => {
                html += `<tr><td>${p.s}</td><td>${p.q}</td><td style="color:${p.p>0?'var(--green)':'var(--red)'}">$${p.p}</td></tr>`;
            });
            document.getElementById("positions").innerHTML = html;
        }
        
        function addLog(id, msg) {
            const el = document.getElementById(id);
            const t = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            el.innerHTML += `[${t}] ${msg}<br>`;
            el.scrollTop = el.scrollHeight;
        }
        
        function connectWallet() {
            walletConnected = true;
            document.getElementById("wallet-info").innerHTML = `✅ Connected on Solana<br>Balance: ~$28,420`;
            addLog("ai-log", "Wallet connected.");
        }
        
        function executeCommand() {
            const input = document.getElementById("cmd");
            const cmd = input.value.trim();
            if (!cmd) return;
            addLog("ai-log", `> ${cmd}`);
            if (cmd.toLowerCase().includes("ai")) switchTab(1);
            else if (cmd.toLowerCase().includes("buy") || cmd.toLowerCase().includes("swap")) {
                addLog("ai-log", walletConnected ? "✅ ONCHAIN EXECUTED" : "Connect wallet first");
            }
            input.value = "";
        }
        
        function switchTab(n) {
            document.querySelectorAll('.content').forEach((c,i) => c.style.display = i===n ? 'block' : 'none');
            document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===n));
        }
        
        document.getElementById("ai-input").addEventListener("keypress", e => {
            if (e.key === "Enter") {
                const q = e.target.value.trim();
                if (!q) return;
                addLog("ai-log", `You: ${q}`);
                e.target.value = "";
                const lower = q.toLowerCase();
                if (lower.includes("btc") || lower.includes("sol") || lower.includes("eth") || lower.includes("stock")) {
                    addLog("ai-log", "AI: Bullish pressure building. Consider long or DCA.");
                } else {
                    addLog("ai-log", "AI: Only crypto/stocks/digital assets supported.");
                }
            }
        });
        
        window.onload = () => {
            updateTickers();
            updatePositions();
            addLog("ai-log", "🚀 Cryptovexxing.com MAX TERMINAL online");
        };
    </script>
</body>
</html>
